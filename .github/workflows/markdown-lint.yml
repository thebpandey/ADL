name: Markdown lint

# Light-touch markdown linting. The rule set (.markdownlint.json) is
# deliberately relaxed: docs pages embed MDX/JSX components, long tables,
# and inline HTML, and beginner-friendly writing should never be blocked
# by style nits. Only clearly-broken markdown fails this check.
on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.mdx"

permissions:
  contents: read

jobs:
  lint:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            docs/**/*.md
            *.md
            .github/**/*.md
